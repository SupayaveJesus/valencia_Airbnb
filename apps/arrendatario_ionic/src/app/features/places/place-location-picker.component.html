<div class="picker-shell">
  <div class="picker-copy">
    <p class="picker-title">Mapa interactivo</p>
    <p class="picker-text">
      Tocá o hacé click sobre el mapa para fijar la ubicación exacta del lugar.
      Si escribís latitud y longitud manualmente, el marcador también se actualiza.
    </p>
  </div>

  <div
    #mapCanvas
    class="picker-map"
    role="application"
    aria-label="Mapa interactivo para seleccionar la ubicación del lugar">
  </div>
</div>
